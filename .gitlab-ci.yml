image: node:22.18.0-alpine

stages:
  - deploy


deploy_develop:
  stage: deploy
  before_script:
    # Install ssh-agent if not already installed, it is required by Docker.
    # (change apt-get to yum if you use a CentOS-based image)
    - 'which ssh-agent || ( apk add --update openssh )'

    - apk add --update bash

    - apk add --update git

    - eval $(ssh-agent -s)

    - echo "$DEV_SSH_PRIVATE_KEY" | ssh-add -

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - '[[ -f /.dockerenv ]] && echo "$DEV_SSH_SERVER_HOSTKEYS" > ~/.ssh/known_hosts'
  script:
    - npm i -g pm2
    - pm2 ls
    - pm2 deploy develop
  only:
    - develop

deploy_main:
  stage: deploy
  before_script:
    - 'which ssh-agent || ( apk add --update openssh )'

    - apk add --update bash

    - apk add --update git

    - eval $(ssh-agent -s)

    - echo "$PROD_SSH_PRIVATE_KEY" | ssh-add -

    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - '[[ -f /.dockerenv ]] && echo "$PROD_SSH_SERVER_HOSTKEYS" > ~/.ssh/known_hosts'
  script:
    - npm i -g pm2
    - pm2 ls
    - pm2 deploy production
  only:
    - main
